<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LHR Trip 🎀</title>
        <style>
        /* Base page styling matching your cute theme */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Added a soft pink glowing background */
            background: radial-gradient(circle, #fff0f5 0%, #ffe4e1 100%); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            overflow-y: hidden; /* Prevents scrollbars from falling bows */
        }

        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            line-height: 2;
            font-size: 1.3rem;
            font-weight: 500;
            /* Added glassmorphism effect to make it look like the picture */
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(255, 105, 180, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            z-index: 10; /* Keeps text above the rain */
        }

        /* The word animation logic */
        .word {
            display: inline-block;
            color: #000000; /* Starts black */
            margin-right: 6px; /* Space between words */
            animation: pinkPulse 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        /* The keyframes for fading to pink and back to black */
        @keyframes pinkPulse {
            0% { color: #000000; transform: scale(1); }
            10% { 
                color: #ff69b4; /* Hot pink */
                text-shadow: 0 0 8px rgba(255, 105, 180, 0.4); 
                transform: scale(1.05); /* Slight pop effect */
            } 
            30% { color: #000000; transform: scale(1); } /* Fades back to black */
            100% { color: #000000; transform: scale(1); }
        }

        /* Cute floating decor at the top */
        .decor {
            font-size: 2.5rem;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Go back button */
        .back-btn {
            margin-top: 50px;
            padding: 12px 30px;
            background-color: #ffe6f2;
            border: 2px solid #ff69b4;
            border-radius: 30px;
            color: #ff69b4;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-btn:hover {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 122, 189, 0.5);
        }

        /* --- BOW RAIN CSS --- */
        .bow {
            position: fixed;
            top: -10vh;
            z-index: 1; /* Behind the container */
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0.2;
            }
        }
        </style>
    </head>
    <body>

        <!-- Container for falling bows -->
        <div id="rain-container"></div>

        <div class="decor">🎀 ♡ ✿</div>

        <div class="container" id="text-container">
            <!-- The text will be magically injected here by the script below -->
        </div>

        <a href="index.html" class="back-btn">go back to us ✿</a>

        <script>
        // --- 1. TEXT ANIMATION SCRIPT ---
        const message = "Hellosss armish. i know u really wanted us to go to lhr together. and honestly i wanted to go with u sm. i am so so sorry i couldn't make it this time. i wish i was there with u rn. i promise i will make it up to u very soon. u r peakkk and i missed u so much. ♡";

        const container = document.getElementById('text-container');
        
        const words = message.split(' ');

        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = word;
            span.style.animationDelay = `${index * 0.1}s`;
            container.appendChild(span);
        });

        // --- 2. BOW RAIN SCRIPT ---
        function createBow() {
            const rainContainer = document.getElementById('rain-container');
            const bow = document.createElement('div');
            
            // Randomize the bow icon slightly for variety (mostly bows, some flowers/hearts)
            const icons = ['🎀', '🎀', '🎀', '🎀', '🌸', '♡'];
            bow.innerText = icons[Math.floor(Math.random() * icons.length)];
            
            bow.classList.add('bow');
            
            // Randomize position, size, and falling speed
            const startLeft = Math.random() * 100; // 0 to 100vw
            const size = Math.random() * 1.5 + 0.8; // 0.8rem to 2.3rem
            const duration = Math.random() * 5 + 4; // 4s to 9s fall time
            
            bow.style.left = `${startLeft}vw`;
            bow.style.fontSize = `${size}rem`;
            bow.style.animationDuration = `${duration}s`;
            
            // Add a slight random opacity so some look further in the background
            bow.style.opacity = Math.random() * 0.5 + 0.5;

            rainContainer.appendChild(bow);
            
            // Remove the bow from the DOM after it finishes falling so it doesn't lag the browser
            setTimeout(() => {
                bow.remove();
            }, duration * 1000);
        }

        // Create a new bow every 300 milliseconds (adjust this number to make it rain heavier or lighter)
        setInterval(createBow, 300);

        // Create an initial burst of bows so the screen isn't empty when it loads
        for(let i = 0; i < 20; i++) {
            setTimeout(createBow, Math.random() * 3000);
        }
    </script>
    </body>
</html>s
